name: Deploy Quilvian Developer

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: quilvian-developer-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/devbenari/newquilviansystembackend
  IMAGE_TAG: developer
  CONTAINER_NAME: quilviandeveloper-container

  # Queue voice persistent host paths.
  # These paths are stored permanently on the Linux server and will be mounted by deploy.sh.
  QUEUE_VOICE_PIPER_HOST_PATH: /opt/quilvian/piper
  QUEUE_VOICE_PIPER_VOICES_HOST_PATH: /opt/quilvian/piper-voices
  QUEUE_VOICE_CACHE_HOST_PATH: /opt/quilvian/queue-voice-cache

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Prepare queue voice folders on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "QUEUE_VOICE_PIPER_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_HOST_PATH }}' \
             QUEUE_VOICE_PIPER_VOICES_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_VOICES_HOST_PATH }}' \
             QUEUE_VOICE_CACHE_HOST_PATH='${{ env.QUEUE_VOICE_CACHE_HOST_PATH }}' \
             bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          sudo mkdir -p "${QUEUE_VOICE_PIPER_HOST_PATH}"
          sudo mkdir -p "${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}/id_ID"
          sudo mkdir -p "${QUEUE_VOICE_CACHE_HOST_PATH}"

          # Do not fail deployment if ownership cannot be changed because of server user differences.
          sudo chown -R deploydev:deploydev "${QUEUE_VOICE_PIPER_HOST_PATH}" "${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}" "${QUEUE_VOICE_CACHE_HOST_PATH}" || true

          sudo chmod -R 755 "${QUEUE_VOICE_PIPER_HOST_PATH}"
          sudo chmod -R 755 "${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}"
          sudo chmod -R 775 "${QUEUE_VOICE_CACHE_HOST_PATH}"

          if [ ! -x "${QUEUE_VOICE_PIPER_HOST_PATH}/piper" ]; then
            echo "WARNING: ${QUEUE_VOICE_PIPER_HOST_PATH}/piper was not found or is not executable. The backend can still deploy, but queue voice generation will fail until Piper is present."
          fi

          if [ ! -f "${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}/id_ID/default.onnx" ] || [ ! -f "${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}/id_ID/default.onnx.json" ]; then
            echo "WARNING: default Piper voice files were not found in ${QUEUE_VOICE_PIPER_VOICES_HOST_PATH}/id_ID. The backend can still deploy, but queue voice generation will fail until model files are present."
          fi
          REMOTE_SCRIPT

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "IMAGE_NAME='${{ env.IMAGE_NAME }}' \
             IMAGE_TAG='${{ env.IMAGE_TAG }}' \
             CONTAINER_NAME='${{ env.CONTAINER_NAME }}' \
             QUEUE_VOICE_PIPER_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_HOST_PATH }}' \
             QUEUE_VOICE_PIPER_VOICES_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_VOICES_HOST_PATH }}' \
             QUEUE_VOICE_CACHE_HOST_PATH='${{ env.QUEUE_VOICE_CACHE_HOST_PATH }}' \
             bash /opt/QuilvianDeveloper/deploy.sh"
