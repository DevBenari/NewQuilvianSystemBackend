name: Deploy Quilvian Developer

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: quilvian-developer-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/devbenari/newquilviansystembackend
  IMAGE_TAG: developer
  CONTAINER_NAME: quilviandeveloper-container

  # Queue voice persistent host paths.
  # These paths are stored permanently on the Linux server and mounted by /opt/QuilvianDeveloper/deploy.sh.
  QUEUE_VOICE_PIPER_HOST_PATH: /opt/quilvian/piper
  QUEUE_VOICE_PIPER_VOICES_HOST_PATH: /opt/quilvian/piper-voices
  QUEUE_VOICE_CACHE_HOST_PATH: /opt/quilvian/queue-voice-cache

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "IMAGE_NAME='${{ env.IMAGE_NAME }}' \
             IMAGE_TAG='${{ env.IMAGE_TAG }}' \
             CONTAINER_NAME='${{ env.CONTAINER_NAME }}' \
             QUEUE_VOICE_PIPER_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_HOST_PATH }}' \
             QUEUE_VOICE_PIPER_VOICES_HOST_PATH='${{ env.QUEUE_VOICE_PIPER_VOICES_HOST_PATH }}' \
             QUEUE_VOICE_CACHE_HOST_PATH='${{ env.QUEUE_VOICE_CACHE_HOST_PATH }}' \
             bash /opt/QuilvianDeveloper/deploy.sh"